<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>Orbital Insight — ACM Dashboard</title>
  <style>
    body { margin:0; background:#0d0d1a; color:#e0e0e0;
           font-family:Arial,sans-serif; }
    #grid { display:grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 1fr 1fr;
            height:100vh; gap:4px; padding:4px; }
    .panel { background:#12122a; border:1px solid #2a2a5a;
             border-radius:6px; overflow:hidden; position:relative; }
    .panel h3 { margin:0; padding:8px 12px;
                background:#1a1a3a; font-size:12px;
                color:#7ec8e3; letter-spacing:1px; }
    canvas { display:block; }
  </style>
</head>
<body>
  <div id='grid'>
    <div class='panel' id='groundtrack-panel'>
      <h3>GROUND TRACK — MERCATOR</h3>
      <canvas id='groundtrack'></canvas>
    </div>
    <div class='panel' id='bullseye-panel'>
      <h3>CONJUNCTION BULLSEYE</h3>
      <canvas id='bullseye'></canvas>
    </div>
    <div class='panel' id='heatmap-panel'>
      <h3>RESOURCE HEATMAP — FUEL + ΔV</h3>
      <canvas id='heatmap'></canvas>
    </div>
    <div class='panel' id='gantt-panel'>
      <h3>MANEUVER TIMELINE (GANTT)</h3>
      <div id='gantt'></div>
    </div>
  </div>
  <script src='js/api.js'></script>
  <script src='js/groundtrack.js'></script>
  <script src='js/bullseye.js'></script>
  <script src='js/heatmap.js'></script>
  <script src='js/gantt.js'></script>
</body>
</html>
